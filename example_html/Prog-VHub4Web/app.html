<title>Remote Heating Control</title>
<style>
body {
  font-family: sans-serif;
  height: 100vh;
  background: linear-gradient(to bottom, #e6f2ff, #b3d9ff);
}
.center {
  position: absolute;
  left:50%; top: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
#status {
  height: 80px;
}
.warm {
  color: red;
  font-size: xx-large;
  vertical-align: sub;
  display: inline-block;
}
.cold {
  color: darkblue;
  font-size: xx-large;
  vertical-align: sub;
  display: inline-block;
}
.wait {
  font-size: xx-large;
  vertical-align: sub;
  display: inline-block;
}
input[type=button]:active {
  background-color: #607D8B;
  transform: translateY(2px);
  box-shadow: 0 2px #607D8B;
}
input {
  display: block;
  width: 100%;
  margin: 10px 0 10px 0;
  padding: 15px 0 15px 0;
  border-radius: 15px;
  font-size: large;
  text-align: center;
}
</style>
<script type="module" src="app.min.js"></script>
</head>
<body>
<div class="center">
  <h2>Remote heating control</h2>
  <div id="status">Enter password</div>
  <div id="auth">
    <input type="password" id="pwd" onchange="login()">
    <input type="button" value="Connect"/>
  </div>
  <div id="ui" style="display: none;">
    <input type="button" value="Turn on for 2 days" onclick="switchOn(48)"/>
    <input type="button" value="Turn on for 1 day" onclick="switchOn(24)"/>
    <input type="button" value="&#x23FB; Turn off" onclick="switchOn(0)"/>
  </div>
</div>
</body>
</html>
